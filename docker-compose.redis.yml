services:
  app:
    build: .
    ports:
      - "8000:8000"
    environment:
      STORAGE_BACKEND: redis
      REDIS_URL: redis://redis:6379/0
      BASE_URL: http://localhost:8000
    depends_on:
      redis:
        condition: service_started

  redis:
    image: redis:8-alpine
    volumes:
      - redis_data:/data

volumes:
  redis_data:
